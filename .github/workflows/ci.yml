name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm run test:run

  e2e:
    name: Testes E2E
    runs-on: ubuntu-latest
    needs: test
    env:
      VITE_CHORE_SUPABASE_URL: ${{ secrets.VITE_CHORE_SUPABASE_URL }}
      VITE_CHORE_SUPABASE_ANON_KEY: ${{ secrets.VITE_CHORE_SUPABASE_ANON_KEY }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
      PLAYWRIGHT_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar browsers Playwright
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CHORE_SUPABASE_URL: ${{ secrets.VITE_CHORE_SUPABASE_URL }}
          VITE_CHORE_SUPABASE_ANON_KEY: ${{ secrets.VITE_CHORE_SUPABASE_ANON_KEY }}

      - name: Iniciar servidor de preview
        run: npm run preview &

      - name: Aguardar servidor
        run: npx wait-on http://localhost:4173/lab-financial-management/ --timeout 30000

      - name: Executar testes E2E
        run: npm run test:e2e

      - name: Upload relatório Playwright (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CHORE_SUPABASE_URL: ${{ secrets.VITE_CHORE_SUPABASE_URL }}
          VITE_CHORE_SUPABASE_ANON_KEY: ${{ secrets.VITE_CHORE_SUPABASE_ANON_KEY }}

      - name: Copiar 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist