<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lab Finanças | Admin Console</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1326;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(23, 31, 51, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-recessed {
            background-color: #060e20;
            transition: all 0.2s ease-in-out;
        }

        .input-recessed:focus-within {
            border-color: #c0c1ff;
            box-shadow: 0 0 0 1px #c0c1ff;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#c0c1ff",
                        "on-background": "#dae2fd",
                        "background": "#0b1326",
                        "surface": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c7c4d7",
                        "outline-variant": "#464554",
                        "surface-container-lowest": "#060e20",
                        "on-primary": "#1000a9"
                    },
                    "spacing": {
                        "lg": "32px",
                        "xs": "8px",
                        "base": "4px",
                        "md": "24px",
                        "gutter": "20px",
                        "xl": "48px",
                        "sm": "16px",
                        "sidebar-width": "240px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="text-on-background min-h-screen flex items-center justify-center bg-background">
<!-- Solid Dark Background -->
<div class="fixed inset-0 z-0 bg-[#0b1326]"></div>
<!-- Main Content -->
<main class="w-full max-w-[400px] px-sm z-10">
<!-- Logo Section -->
<div class="text-center mb-md">
<h1 class="font-headline-lg text-headline-lg font-bold text-primary tracking-tight">Lab Finanças</h1>
<p class="font-label-sm text-label-sm uppercase tracking-widest text-outline-variant mt-xs">Admin Console</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-md shadow-2xl">
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" for="email">E-mail</label>
<div class="input-recessed flex items-center px-sm rounded-lg border border-outline-variant/10 py-2">
<span class="material-symbols-outlined text-outline-variant text-[20px] mr-sm" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md text-body-md placeholder-outline-variant/50 p-0" id="email" placeholder="admin@labfinancas.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" for="password">Senha</label>
<div class="input-recessed flex items-center px-sm rounded-lg border border-outline-variant/10 py-2">
<span class="material-symbols-outlined text-outline-variant text-[20px] mr-sm" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-body-md text-body-md placeholder-outline-variant/50 p-0" id="password" placeholder="••••••••" type="password"/>
<button class="text-outline-variant hover:text-primary transition-colors flex items-center" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Button -->
<button class="w-full text-white font-bold rounded-lg flex items-center justify-center gap-xs transition-all transform active:scale-[0.98] mt-lg group py-2" style="background-color: #615FFF;" type="submit">
<span class="font-headline-md text-headline-md">Entrar no Painel</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Info -->
<div class="text-center mt-lg">
<p class="text-outline-variant text-label-sm">© 2024 Lab Finanças. Todos os direitos reservados.</p>
</div>
</main>
<!-- Subtle Particle Effect (optional, kept light) -->
<canvas class="fixed inset-0 pointer-events-none z-0" id="particleCanvas"></canvas>
<script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2 + 0.3;
                this.speedX = Math.random() * 0.15 - 0.075;
                this.speedY = Math.random() * 0.15 - 0.075;
                this.opacity = Math.random() * 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = `rgba(192, 193, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            const count = 40;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            createParticles();
        });
        
        initCanvas();
        createParticles();
        animate();
    </script>
</body></html>
