                        "on-error": "#690005",

                        "on-tertiary-fixed": "#40000d",
                        "on-secondary": "#003824",
                        "tertiary-fixed": "#ffdadb",
                        "surface-container-low": "#131b2e",
                        "surface-container": "#171f33",

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .password-requirement-item.valid {
            color: #4edea3;
        }
        .password-requirement-item.valid span {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md overflow-hidden relative">
<!-- Atmospheric Animated Background -->

<!-- Main Content Wrapper (Focus Mode) -->
<main class="relative z-10 w-full max-w-[440px] animate-in fade-in zoom-in duration-500">
<!-- Logo/Brand Anchor -->
<div class="flex justify-center mb-lg">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-headline-lg text-headline-lg font-bold text-primary tracking-tight">Lab Finanças</span>
</div>
</div>
<!-- Modal Card -->
<section class="bg-surface-container-low border border-outline-variant/10 rounded-xl p-lg shadow-2xl backdrop-blur-md">
<header class="mb-md">
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Primeiro Acesso</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Por segurança, você deve alterar sua senha no seu primeiro login.</p>
</header>
<form class="space-y-sm" id="passwordForm">
<!-- New Password Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="new_password">Nova senha</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-lg py-sm pl-[44px] pr-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/50" id="new_password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="toggleVisibility('new_password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="confirm_password">Confirmar senha</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock_reset">lock_reset</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-lg py-sm pl-[44px] pr-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/50" id="confirm_password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="toggleVisibility('confirm_password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-sm">
<button class="w-full text-white font-bold py-sm rounded-lg flex items-center justify-center gap-xs hover:opacity-90 active:scale-[0.98] transition-all group" style="background-color: #615FFF;" type="submit">
<span>Atualizar Senha</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</section>
<!-- Requirements Section (Below Modal) -->
<section class="mt-md px-xs">
<div class="grid grid-cols-1 md:grid-cols-2 gap-y-xs gap-x-sm">
<div class="password-requirement-item flex items-center gap-xs text-on-surface-variant/70 transition-colors" id="req-lower">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span>
<span class="font-label-sm text-label-sm">Letras minúsculas</span>
</div>
<div class="password-requirement-item flex items-center gap-xs text-on-surface-variant/70 transition-colors" id="req-upper">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span>
<span class="font-label-sm text-label-sm">Letras maiúsculas</span>
</div>
<div class="password-requirement-item flex items-center gap-xs text-on-surface-variant/70 transition-colors" id="req-number">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span>
<span class="font-label-sm text-label-sm">Números</span>
</div>
<div class="password-requirement-item flex items-center gap-xs text-on-surface-variant/70 transition-colors" id="req-special">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span>
<span class="font-label-sm text-label-sm">Caracteres especiais</span>
</div>
</div>
</section>
<!-- Footer Disclaimer -->
<footer class="mt-xl text-center">
<p class="font-label-sm text-label-sm text-outline-variant tracking-widest uppercase opacity-60">
                SEGURANÇA BANCÁRIA END-TO-END
            </p>
</footer>
</main>
<script>
        // Password Visibility Toggle
        function toggleVisibility(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Live Requirement Validation
        const passwordInput = document.getElementById('new_password');
        const requirements = {
            lower: { el: document.getElementById('req-lower'), regex: /[a-z]/ },
            upper: { el: document.getElementById('req-upper'), regex: /[A-Z]/ },
            number: { el: document.getElementById('req-number'), regex: /[0-9]/ },
            special: { el: document.getElementById('req-special'), regex: /[^A-Za-z0-9]/ }
        };

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            Object.keys(requirements).forEach(key => {
                const req = requirements[key];
                if (req.regex.test(val)) {
                    req.el.classList.add('valid');
                } else {
                    req.el.classList.remove('valid');
                }
            });
        });

        // Form Submit Simulation
        document.getElementById('passwordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span><span>Processando...</span>`;
            
            setTimeout(() => {
                btn.classList.replace('bg-[#615FFF]', 'bg-secondary');
                btn.style.backgroundColor = '#4edea3';
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span><span>Senha Atualizada!</span>`;
                
                setTimeout(() => {
                    alert('Sua senha foi alterada com sucesso. Redirecionando para o Dashboard...');
                }, 1000);
            }, 1500);
        });
    </script>
</body></html>
